<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Calculator body -->
  <rect x="20" y="15" width="60" height="70" rx="6" fill="url(#mathGradient)" stroke="url(#mathGradient)" stroke-width="2"/>
  <!-- Display screen -->
  <rect x="28" y="22" width="44" height="16" rx="2" fill="#1f2937" opacity="0.3"/>
  <text x="50" y="33" font-size="12" font-weight="bold" fill="white" text-anchor="middle">42</text>
  <!-- Button grid -->
  <g fill="white" opacity="0.9">
    <!-- Row 1 -->
    <rect x="28" y="42" width="10" height="8" rx="1"/>
    <rect x="41" y="42" width="10" height="8" rx="1"/>
    <rect x="54" y="42" width="10" height="8" rx="1"/>
    <!-- Row 2 -->
    <rect x="28" y="53" width="10" height="8" rx="1"/>
    <rect x="41" y="53" width="10" height="8" rx="1"/>
    <rect x="54" y="53" width="10" height="8" rx="1"/>
    <!-- Row 3 -->
    <rect x="28" y="64" width="10" height="8" rx="1"/>
    <rect x="41" y="64" width="10" height="8" rx="1"/>
    <rect x="54" y="64" width="10" height="8" rx="1"/>
  </g>
  <!-- Button symbols -->
  <g fill="url(#mathGradient)" font-size="6" font-weight="bold" text-anchor="middle">
    <text x="33" y="47">+</text>
    <text x="46" y="47">-</text>
    <text x="59" y="47">×</text>
    <text x="33" y="58">÷</text>
    <text x="46" y="58">=</text>
    <text x="59" y="58">C</text>
    <text x="33" y="69">7</text>
    <text x="46" y="69">8</text>
    <text x="59" y="69">9</text>
  </g>
</svg>